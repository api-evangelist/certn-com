apis:
  - aid: certn-com:certn-hr-api
    name: Certn HR API (Legacy v1)
    description: >-
      Human Resources surface of the legacy Certn API used to invite applicants
      to a hosted screening application, run instant "quick" screens from a
      single request body, add package items to existing applicants, and list
      applications for a team account. Production base URL `https://api.certn.co`
      with `https://demo-api.certn.co` for testing. Token-authenticated.
      Deprecated 2026-04-13; sunsets 2026-08-05 — new integrations should use
      the CertnCentric API.
    humanURL: https://docs.certn.co/api/certn-api-v-1.0/api-reference/hr
    tags:
      - Background Checks
      - Human Resources
      - Applicants
      - Applications
      - Packages
      - Legacy
