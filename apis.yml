      - type: Deprecation
        url: https://docs.certn.co/api/certn-api-v-1.0
  - aid: certn-com:certn-pm-api
    name: Certn Property Management API (Legacy v2)
    description: >-
      Property Management surface of the legacy Certn API for tenant
      screening — invite an applicant to complete a screen, run an instant
      quick screen, add packages to an existing applicant, and list
      applications. Endpoints under `/api/v2/`. Production base URL
      `https://api.certn.co`. Deprecated 2026-04-13; sunsets 2026-08-05.
    humanURL: https://docs.certn.co/api/certn-api-v-1.0/api-reference/pm
    tags:
      - Background Checks
      - Property Management
      - Tenant Screening
      - Applicants
      - Applications
      - Legacy
    properties:
      - type: Documentation
        url: https://docs.certn.co/api/certn-api-v-1.0/api-reference/pm
      - type: BaseURL
        url: https://api.certn.co
      - type: Deprecation
        url: https://docs.certn.co/api/certn-api-v-1.0
  - aid: certn-com:certncentric-api
    name: CertnCentric API
    description: >-
      Next-generation Certn screening API replacing the deprecated v1/v2
      industry-split surfaces. Provides a unified RESTful contract for
      embedding background checks (criminal, identity, employment, education,
      credit, references, MVR, public records, social media) into ATS, HRIS,
      and property management workflows with webhook callbacks for
      asynchronous results. This is the recommended integration path; the
      legacy HR and PM APIs will be retired on 2026-08-05.
    humanURL: https://centric-api-docs.certn.co/
    tags:
      - Background Checks
      - Screening
      - Identity Verification
      - Webhooks
      - REST
    properties:
      - type: Documentation
        url: https://centric-api-docs.certn.co/
      - type: Documentation
        url: https://centric-api-docs.certn.co/#introduction
      - type: BaseURL
        url: https://api.certn.co
  - aid: certn-com:certn-webhooks
    name: Certn Webhooks
    description: >-
      Outbound webhook delivery for asynchronous screening events. Certn posts
      JSON payloads containing applicant status, result, check_executions,
      enhanced_identity_verification, rcmp_result, information, and
      activity_log fields to a customer-configured endpoint configured in team
      settings. Payloads are signed with an HMAC-SHA256 `Certn-Signature`
      header carrying a timestamped signature (`t=<timestamp>,v1=<signature>`)
      to prevent replay attacks.
    humanURL: https://docs.certn.co/api/certn-api-v-1.0/guides/use-the-api/webhooks
    tags:
