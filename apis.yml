aid: certn-com
name: Certn
description: >-
  Certn is a Canadian background screening platform headquartered in Victoria,
  British Columbia, providing fast, FCRA / SOC 2 Type II / ISO 27001 compliant
  background checks for employment, tenant, and partner screening across more
  than 195 countries. The Certn platform delivers criminal record checks
  (Canadian Basic and Enhanced, SOQUIJ Quebec, international), identity
  verification (OneID across 13,500+ document types), employment, education,
  and credential verification, credit reports, public records and social media
  screening, reference checks, driver's abstract / MVR, and white-label
  candidate experiences. Certn exposes a REST API used by 100+ ATS / HRIS
  partners (Workable, Greenhouse, Lever, Workday and others) to embed
  screening directly into hiring and leasing workflows, with webhook callbacks
  for asynchronous result delivery. The legacy v1/v2 API (`api.certn.co`,
  industry-split HR and Property Management surfaces) was deprecated on
  2026-04-13 and will be retired on 2026-08-05; new integrations target the
  CertnCentric API at `centric-api-docs.certn.co`.
